<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact BVL</title>

<link href="https://fonts.googleapis.com/css2?family=Jost&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Jost', sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 10%;
    background: #fff;
    border-bottom: 1px solid #eee;
}

.navmenu {
    display: flex;
    gap: 20px;
}

.navmenu a {
    text-decoration: none;
    color: #111;
}

/* TITLE */
.title {
    text-align: center;
    padding: 40px 20px;
}

.title h1 {
    font-size: 36px;
}

/* GRID */
.contact-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px 10%;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 10px;
}

/* TEXT */
.card h3 {
    margin: 15px 0 5px;
}

.card p {
    color: #777;
    font-size: 14px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
}

.ig {
    background: #E1306C;
}
</style>
</head>

<body>

<header>

    <ul class="navmenu">

        <li><a href="about.html">ABOUT</a></li>
        <li><a href="contact.html">CONTACT</a></li>
    </ul>
</header>

</div>

<div class="contact-container">

        <img src="team1.jpg" alt="">

        <a href="https://wa.me/6281283326156" class="btn">Chat WhatsApp</a>
        <a href="https://instagram.com/1tz.bul" class="btn ig">Instagram</a>
    </div>

    <!-- JALALUDIN -->

        <a href="https://instagram.com/1tz.bul" class="btn ig">Instagram</a>

        <a href="https://instagram.com/1tz.bull" class="btn ig">Instagram</a>

</div>

</body>
</html>
