<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart BVL</title>

<link href="https://fonts.googleapis.com/css2?family=Jost&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Jost', sans-serif;
    background: #f8f8f8;
    margin: 0;
}

/* HEADER */
.header {
    background: #fff;
    padding: 15px 10%;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #eee;
}

/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    padding: 30px 10%;
}

/* CART ITEMS */
.cart-items {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
}

.cart-item {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
}

.cart-item img {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    margin-right: 15px;
}

.cart-info {
    flex: 1;
}

.cart-info h4 {
    margin: 0;
}

.cart-info p {
    color: #777;
}

/* QUANTITY */
.qty {
    display: flex;
    align-items: center;
    gap: 8px;
}

.qty button {
    width: 30px;
    height: 30px;
    border: none;
    background: #eee;
    cursor: pointer;
    border-radius: 5px;
}

.remove {
    color: red;
    cursor: pointer;
    font-size: 14px;
}

/* SUMMARY */
.summary {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    height: fit-content;
}

.summary h3 {
    margin-bottom: 15px;
}

.summary p {
    display: flex;
    justify-content: space-between;
}

.checkout {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #25D366;
    color: #fff;
    border: none;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

/* EMPTY */
.empty {
    text-align: center;
    color: #888;
}

.checkout-form {
    margin-top: 20px;
}

.checkout-form input,
.checkout-form select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">🛒 Keranjang BVL</div>

<div class="container">
    
    <div class="cart-items" id="cart-items"></div>

    <div class="summary">
        <div class="checkout-form">
    <h3>Checkout</h3>

    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="text" id="alamat" placeholder="Alamat Lengkap">
    <input type="text" id="nohp" placeholder="No WhatsApp">

    <select id="metode">
        <option value="WA">WhatsApp (Rekomendasi)</option>
        <option value="COD">COD (Bayar di Tempat)</option>
        <option value="TRANSFER">Transfer Bank</option>
        <option value="E-WALLET">E-Wallet (OVO/DANA/GOPAY)</option>
    </select>

    <button class="checkout" onclick="checkout()">Pesan Sekarang</button>
</div>
        <h3>Ringkasan</h3>
        <p><span>Total</span> <span id="total">Rp 0</span></p>
        <button class="checkout" onclick="checkoutWA()">Checkout WhatsApp</button>
    </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");
let totalEl = document.getElementById("total");

function renderCart() {
    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Keranjang kosong 🛒</p>";
        totalEl.innerText = "Rp 0";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {

        let price = parseInt(item.price.replace(/[^\d]/g, ""));

        total += price;

        let div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
            <img src="${item.img}">
            <div class="cart-info">
                <h4>${item.name}</h4>
                <p>${item.price}</p>
                <span class="remove" onclick="removeItem(${index})">Hapus</span>
            </div>
        `;

        container.appendChild(div);
    });

    totalEl.innerText = "Rp " + total.toLocaleString();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function checkoutWA() {
    let message = "Halo, saya ingin order:%0A";

    cart.forEach(item => {
        message += `- ${item.name} (${item.price})%0A`;
    });

    message += `%0ATotal: ${totalEl.innerText}`;

    let url = `https://wa.me/6281283326156?text=${message}`;
    window.open(url, "_blank");
}

function checkout() {
    let nama = document.getElementById("nama").value;
    let alamat = document.getElementById("alamat").value;
    let nohp = document.getElementById("nohp").value;
    let metode = document.getElementById("metode").value;

    if (!nama || !alamat || !nohp) {
        alert("Isi data terlebih dahulu!");
        return;
    }

    let message = "🛒 ORDER BVL%0A%0A";

    message += `Nama: ${nama}%0A`;
    message += `No HP: ${nohp}%0A`;
    message += `Alamat: ${alamat}%0A`;
    message += `Metode: ${metode}%0A%0A`;

    message += "Detail Pesanan:%0A";

    cart.forEach(item => {
        message += `- ${item.name} (${item.price})%0A`;
    });

    message += `%0ATotal: ${totalEl.innerText}`;

    // 🔥 PRIORITAS WHATSAPP
    let url = `https://wa.me/6281283326156?text=${message}`;

    window.open(url, "_blank");
}
renderCart();
</script>

</body>
</html>
