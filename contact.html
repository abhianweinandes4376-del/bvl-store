<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact BVL</title>

<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Jost', sans-serif;
}

body{
    background:#f6f6f6;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 10%;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    z-index:1000;
    transition:0.3s;
}

/* efek saat scroll */
.header.scrolled{
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* logo */
.logo img{
    width:110px;
}

/* menu */
.navmenu{
    display:flex;
    gap:30px;
}

.navmenu a{
    text-decoration:none;
    color:#111;
    font-size:14px;
    font-weight:500;
    position:relative;
    transition:0.3s;
}

/* underline animasi */
.navmenu a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#111;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

.navmenu a:hover::after{
    width:100%;
}

.navmenu a:hover{
    color:#000;
}


.title{
    text-align:center;
    padding:60px 20px 30px;
}

.title h1{
    font-size:32px;
    margin-bottom:5px;
}

.title p{
    color:#777;
    font-size:14px;
}

/* CONTAINER */
.contact-container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding:30px 10%;
}

/* CARD */
.card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
    transition:.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 5px;
    font-weight:600;
}

.card p{
    color:#777;
    font-size:13px;
}

/* BUTTON */
.btn{
    display:block;
    margin:10px 20px;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    transition:.3s;
}

.wa{
    background:#25D366;
    color:#fff;
}

.wa:hover{
    background:#1ebe5d;
}

.ig{
    background:#111;
    color:#fff;
}

.ig:hover{
    background:#333;
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="logo">
        <img src="logo.png">
    </a>

    <div class="navmenu">
        <a href="index.html">HOME</a>
        <a href="index.html#trending">PRODUCT</a>
        <a href="about.html">ABOUT</a>
    </div>
</header>

<div class="title">
    <h1>Contact Our Team</h1>
    <p>Hubungi kami langsung dengan mudah</p>
</div>

<div class="contact-container">

    <div class="card">
        <img src="bian.jpg">
        <h3>Abhian Weinandes</h3>
        <p>Owner</p>
        <a href="https://wa.me/6281283326156" class="btn wa">WhatsApp</a>
        <a href="https://instagram.com/1tz.bul" class="btn ig">Instagram</a>
    </div>

    <div class="card">
        <img src="jalal.jpg">
        <h3>Jalaludin R.S</h3>
        <p>Marketing</p>
        <a href="https://wa.me/62881011179833" class="btn wa">WhatsApp</a>
        <a href="https://instagram.com/1tz.bul" class="btn ig">Instagram</a>
    </div>

    <div class="card">
        <img src="epan.jpg">
        <h3>Epan Pahlevi</h3>
        <p>Support</p>
        <a href="https://wa.me/qr/6283875040325" class="btn wa">WhatsApp</a>
        <a href="https://www.instagram.com/vannskyyyy?igsh=MW5sZWdvcGhhejFqYw==" class="btn ig">Instagram</a>
    </div>

</div>

</body>
</html>
